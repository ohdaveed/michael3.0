name: Deploy to Bluehost

on:
  push:
    branches: [main]
    paths:
      - "public/**"
      - "vite.config.js"
      - "package.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-bluehost
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload to Bluehost via FTPS
        uses: SamKirkland/FTP-Deploy-Action@8e83cea8672e3fbcbb9fdafff34debf6ae4c5f65 # v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          # "./" assumes the FTP account's home directory IS the site's
          # document root (recommended setup — see README). Override with a
          # repository variable FTP_SERVER_DIR (e.g. "public_html/") if you
          # use the main cPanel account instead.
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}

      # To set up build and deploy notifications:
      # 1. Create a webhook URL in your chat application (e.g., Slack, Discord), CRM (e.g., Clio),
      #    or automation platform (e.g., Zapier, Make).
      # 2. In your GitHub repository, go to Settings > Secrets and variables > Actions.
      # 3. Click "New repository secret".
      # 4. Name the secret DEPLOY_WEBHOOK_URL and paste your webhook URL as the value.
      #
      # Note: These notification steps will only run if DEPLOY_WEBHOOK_URL is configured in your repository secrets.

      - name: Send Deploy Success Notification
        if: success() && env.DEPLOY_WEBHOOK_URL != ''
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          PAYLOAD=$(jq -n \
            --arg status "success" \
            --arg repository "$REPOSITORY" \
            --arg branch "$REF_NAME" \
            --arg run_id "$RUN_ID" \
            --arg run_url "https://github.com/$REPOSITORY/actions/runs/$RUN_ID" \
            --arg actor "$ACTOR" \
            --arg commit "$COMMIT_SHA" \
            --arg commit_message "${COMMIT_MESSAGE:-Triggered manually or no head commit info}" \
            '{status: $status, repository: $repository, branch: $branch, run_id: $run_id, run_url: $run_url, actor: $actor, commit: $commit, commit_message: $commit_message}')
          curl -s -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DEPLOY_WEBHOOK_URL"

      - name: Send Deploy Failure Notification
        if: failure() && env.DEPLOY_WEBHOOK_URL != ''
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
          ACTOR: ${{ github.actor }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          PAYLOAD=$(jq -n \
            --arg status "failed" \
            --arg repository "$REPOSITORY" \
            --arg branch "$REF_NAME" \
            --arg run_id "$RUN_ID" \
            --arg run_url "https://github.com/$REPOSITORY/actions/runs/$RUN_ID" \
            --arg actor "$ACTOR" \
            --arg commit "$COMMIT_SHA" \
            --arg commit_message "${COMMIT_MESSAGE:-Triggered manually or no head commit info}" \
            '{status: $status, repository: $repository, branch: $branch, run_id: $run_id, run_url: $run_url, actor: $actor, commit: $commit, commit_message: $commit_message}')
          curl -s -X POST -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DEPLOY_WEBHOOK_URL"
