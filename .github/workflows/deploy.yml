name: Deploy to Bluehost

on:
  push:
    branches: [main]
    paths:
      - "public/**"
      - "vite.config.js"
      - "package.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-bluehost
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload to Bluehost via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          # "./" assumes the FTP account's home directory IS the site's
          # document root (recommended setup — see README). Override with a
          # repository variable FTP_SERVER_DIR (e.g. "public_html/") if you
          # use the main cPanel account instead.
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}

      # To set up build and deploy notifications:
      # 1. Create a webhook URL in your chat application (e.g., Slack, Discord), CRM (e.g., Clio),
      #    or automation platform (e.g., Zapier, Make).
      # 2. In your GitHub repository, go to Settings > Secrets and variables > Actions.
      # 3. Click "New repository secret".
      # 4. Name the secret DEPLOY_WEBHOOK_URL and paste your webhook URL as the value.
      #
      # Note: These notification steps will only run if DEPLOY_WEBHOOK_URL is configured in your repository secrets.

      - name: Send Deploy Success Notification
        if: success() && env.DEPLOY_WEBHOOK_URL != ''
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" \
            -d '{
              "status": "success",
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "run_id": "${{ github.run_id }}",
              "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "actor": "${{ github.actor }}",
              "commit": "${{ github.sha }}",
              "commit_message": ${{ toJson(github.event.head_commit.message || 'Triggered manually or no head commit info') }}
            }' \
            "$DEPLOY_WEBHOOK_URL"

      - name: Send Deploy Failure Notification
        if: failure() && env.DEPLOY_WEBHOOK_URL != ''
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" \
            -d '{
              "status": "failed",
              "repository": "${{ github.repository }}",
              "branch": "${{ github.ref_name }}",
              "run_id": "${{ github.run_id }}",
              "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "actor": "${{ github.actor }}",
              "commit": "${{ github.sha }}",
              "commit_message": ${{ toJson(github.event.head_commit.message || 'Triggered manually or no head commit info') }}
            }' \
            "$DEPLOY_WEBHOOK_URL"

