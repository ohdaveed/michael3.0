name: Deploy to Bluehost

on:
  push:
    branches: [main]
    paths:
      - "public/**"
      - "robots.txt"
      - "sitemap.xml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: deploy-bluehost
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site files
        run: |
          mkdir dist
          cp -r public/. dist/
          cp robots.txt sitemap.xml dist/

      - name: Upload to Bluehost via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          # "./" assumes the FTP account's home directory IS the site's
          # document root (recommended setup — see README). Override with a
          # repository variable FTP_SERVER_DIR (e.g. "public_html/") if you
          # use the main cPanel account instead.
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}
